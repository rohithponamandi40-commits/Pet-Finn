<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog-Login</title>
    <link rel="stylesheet" href="style19.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/bootstrap.bundle.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>
    <section class="DL container-fluid">
        <img src="assets/finn.png" alt="">
        <h1>Create Account</h1>
        <p>You MUST create an account to manage your subscription.</p>

    </section>

    <div class="DL1 pt-3">
        <label for="RegisterForm-email">EMAIL</label>
        <div class="DL2">
            <input type="email" name="customer[email]" id="RegisterForm-email" aria-required="true">
        </div>
    </div>
    <div class="DL3">
        <label for="RegisterForm-email">PASSWORD</label>
        <div class="DL4">
            <input type="password" name="customer[password]" id="RegisterForm-password" aria-required="true">
        </div>

    </div>
    <div class="DL5">
        <button class="rounded-5 imp">
            <li><a href="shop-all.html">Submit<img src="assets/arrow1.svg" alt=""></a></li>
        </button>
    </div>



</body>

</html>
